services:
  shiori:
    image: ghcr.io/go-shiori/shiori:latest
    container_name: shiori
    expose:
      - "8080"
    volumes:
      - "./dev-data:/srv/shiori"
      - ".:/src/shiori"
      - "go-mod-cache:/go/pkg/mod"
    restart: unless-stopped
    environment:
      SHIORI_DIR: /srv/shiori
      # SQLite is the default when SHIORI_DATABASE_URL is not set

  backup:
    build: ./backup
    container_name: shiori-backup
    volumes:
      - "./dev-data:/srv/shiori" # Shiori data (SQLite DB, archives, thumbs, ebooks)
      - "./backup/src:/app" # Source code for development
      - "./backup/rclone.conf:/config/rclone/rclone.conf:ro" # rclone config
      - "shiori-backups:/backups" # Local backup storage
    environment:
      # For SQLite mode, only SHIORI_DATA_DIR is needed
      SHIORI_DATA_DIR: ${SHIORI_DATA_DIR:-/srv/shiori}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_RUN_ON_START: ${BACKUP_RUN_ON_START:-false}
      BACKUP_DELETE_LOCAL_AFTER_UPLOAD: ${BACKUP_DELETE_LOCAL_AFTER_UPLOAD:-false}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY}
      BACKUP_RCLONE_DESTINATIONS: ${BACKUP_RCLONE_DESTINATIONS}
      BACKUP_WEBHOOK_URL: ${BACKUP_WEBHOOK_URL}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      - shiori
    restart: unless-stopped

volumes:
  go-mod-cache:
  shiori-backups:
